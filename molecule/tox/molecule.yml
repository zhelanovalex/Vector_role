---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: instance
    image: centoc_ansib:latest
    pre_build_image: true
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    privileged: true
    cgroupns_mode: host
provisioner:
  name: ansible
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - converge
    - destroy
